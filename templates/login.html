<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptly — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; }

        body {
            min-height: 100vh;
            background: #f5f0e8;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(220, 210, 140, 0.55) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 10%, rgba(180, 190, 170, 0.4) 0%, transparent 45%),
                radial-gradient(ellipse at 60% 80%, rgba(210, 200, 150, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(190, 185, 160, 0.3) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .serif { font-family: 'DM Serif Display', serif; }

        input:focus { outline: none; }

        .login-btn {
            background: rgba(100, 90, 60, 0.85);
            transition: all 0.2s;
        }
        .login-btn:hover {
            background: rgba(80, 70, 40, 0.95);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center px-4">

    <div class="w-full max-w-sm">

        <!-- Title -->
        <div class="text-center mb-8">
            <h1 class="serif text-5xl text-gray-800 italic">Scriptly</h1>
            <p class="text-gray-400 text-sm font-light mt-2">Sign in to your account</p>
        </div>

        <!-- Card -->
        <div class="glass rounded-2xl p-8">

            {% if error_message %}
            <p class="text-red-400 text-sm text-center mb-4">{{ error_message }}</p>
            {% endif %}

            <form class="space-y-4" action="" method="POST">
                {% csrf_token %}

                <div>
                    <label for="username" class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username"
                        class="w-full px-4 py-3 rounded-xl bg-white bg-opacity-60 border border-white border-opacity-80 text-gray-700 placeholder-gray-400 text-sm focus:bg-white focus:bg-opacity-80 transition-all">
                </div>

                <div>
                    <label for="password" class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password"
                        class="w-full px-4 py-3 rounded-xl bg-white bg-opacity-60 border border-white border-opacity-80 text-gray-700 placeholder-gray-400 text-sm focus:bg-white focus:bg-opacity-80 transition-all">
                </div>

                <button type="submit" class="login-btn w-full text-white py-3 rounded-xl text-sm font-medium mt-2">
                    Log in
                </button>
            </form>

            <p class="text-center text-sm text-gray-400 mt-6 font-light">
                Don't have an account?
                <a href="/signup" class="text-gray-600 underline hover:text-gray-800">Sign up</a>
            </p>

        </div>
    </div>

</body>
</html>
