<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptly — Post</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; }

        body {
            min-height: 100vh;
            background: #f5f0e8;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(220, 210, 140, 0.55) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 10%, rgba(180, 190, 170, 0.4) 0%, transparent 45%),
                radial-gradient(ellipse at 60% 80%, rgba(210, 200, 150, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(190, 185, 160, 0.3) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .serif { font-family: 'DM Serif Display', serif; }

        .content p { margin-bottom: 1rem; line-height: 1.8; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Nav -->
    <nav class="nav-glass px-8 py-4 flex justify-between items-center sticky top-0 z-10">
        <a href="/blog-list" class="text-sm text-gray-500 hover:text-gray-800 transition-colors tracking-wide">← All Posts</a>
        <a href="/logout/" class="text-sm text-gray-500 hover:text-gray-800 transition-colors tracking-wide">Log out</a>
    </nav>

    <!-- Main -->
    <div class="flex-grow flex items-start justify-center px-4 pt-16 pb-20">
        <div class="w-full max-w-2xl">

            <!-- Meta -->
            <div class="mb-8">
                <p class="text-xs uppercase tracking-widest text-gray-400 mb-2">{{ blog_article_detail.created_at|date:"F j, Y" }}</p>
                <h2 class="serif text-4xl text-gray-800 italic mb-4">{{ blog_article_detail.youtube_title }}</h2>
                <a href="{{ blog_article_detail.youtube_link }}" target="_blank" class="text-sm text-gray-400 hover:text-gray-600 transition-colors underline break-all">
                    {{ blog_article_detail.youtube_link }}
                </a>
            </div>

            <!-- Content -->
            <div class="glass rounded-2xl p-8">
                <p class="text-xs uppercase tracking-widest text-gray-400 mb-6">Generated Article</p>
                <div class="content text-gray-700 text-sm leading-relaxed">
                    {{ blog_article_detail.generated_content }}
                </div>
            </div>

        </div>
    </div>

</body>
</html>
